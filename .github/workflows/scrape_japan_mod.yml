name: 爬取日本防衛省中國海軍艦艇動向

on:
  schedule:
    # 每天台北時間 14:00 執行 (UTC 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch:  # 允許手動觸發

concurrency:
  group: csv-battleship-writers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Python dependencies
      run: |
        pip install pandas PyPDF2 httpx requests python-dateutil

    - name: Run Japan MOD scraper
      run: python scraper_japan_mod.py
      
    - name: Commit and push if changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/JapanandBattleship.csv data/japan_scrape_history.json
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "🇯🇵 更新日本防衛省資料 $(date +'%Y-%m-%d %H:%M')"
          # Retry push with pull --rebase to handle concurrent updates
          for i in 1 2 3 4; do
            git push && break
            echo "Push failed (attempt $i/4), pulling latest changes..."
            git pull --rebase --autostash -X theirs origin main
            sleep $((2 ** i))
          done
        fi
