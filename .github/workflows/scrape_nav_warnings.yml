name: Scrape MSA Military Exercise Warnings

on:
  schedule:
    # 每天 UTC 02:15 (北京時間 10:15) 執行
    - cron: '15 2 * * *'
  
  # 允許手動觸發
  workflow_dispatch:
  
  # 代碼變更時執行
  push:
    branches:
      - main
    paths:
      - 'scripts/scrapers/NavigationWarning_scraper.py'
      - 'scripts/scrape_nav_warnings.py'
      - '.github/workflows/scrape_nav_warnings.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas lxml httpx

    - name: 🎯 Run Military Exercise Scraper (cumulative merge)
      run: |
        # 累積合併模式：新資料與現有資料以 url 去重合併，歷史不會被覆蓋
        # 抓主站 .jhtml 頻道頁（每頻道最新一頁 ~20 篇），繞開 /page/* 的 WAF
        python scripts/scrape_nav_warnings.py --max-pages 1 --days-back 365
    
    - name: 📊 Display statistics
      run: |
        if [ -f data/navigation_warnings/statistics.json ]; then
          echo "📈 統計信息:"
          cat data/navigation_warnings/statistics.json | python -m json.tool
        fi
    
    - name: 💾 Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add data/navigation_warnings/

        if git diff --staged --quiet; then
          echo "📭 No changes to commit"
        else
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git commit -m "🎯 Auto-update: Military Exercise Warnings - ${TIMESTAMP}"

          # Retry push with pull --rebase to handle concurrent updates
          for i in 1 2 3 4; do
            git push && break
            echo "⚠️  Push failed (attempt $i/4), pulling latest changes..."
            git pull --rebase --autostash -X theirs origin main
            sleep $((2 ** i))
          done
          echo "✅ Changes committed and pushed"
        fi
    
    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: military-exercise-warnings
        path: |
          data/navigation_warnings/*.csv
          data/navigation_warnings/*.json
        retention-days: 90
