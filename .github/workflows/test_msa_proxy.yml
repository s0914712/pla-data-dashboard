name: Test MSA scrape connectivity

# 暫時性診斷 workflow：驗證 Firecrawl 能否抓 msa.gov.cn 航警頁。
# 驗證完成後可刪除此檔案。
on:
  workflow_dispatch:
  push:
    branches:
      - claude/nav-warnings-cutoff-u0yauw
    paths:
      - '.github/workflows/test_msa_proxy.yml'
      - 'scripts/scrapers/base_scraper.py'

jobs:
  test-firecrawl:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: pip install httpx

    - name: 🧪 Test Firecrawl on msa.gov.cn
      env:
        FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import httpx

        key = (os.getenv('FIRECRAWL_API_KEY') or '').strip()
        if not key:
            print('❌ FIRECRAWL_API_KEY secret 未設定或為空')
            sys.exit(1)
        print('✅ FIRECRAWL_API_KEY 已設定（值不顯示）')

        API = 'https://api.firecrawl.dev/v2/scrape'
        MSA_URL = ('https://www.msa.gov.cn/page/channelArticles.do'
                   '?channelids=C8896863-B101-4C43-8705-536A03EB46FF&pageNo=1')  # 辽宁海事局
        HEADERS = {'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'}

        def try_scrape(label, payload):
            print(f'\n--- {label} ---')
            print(f'  payload: {json.dumps({k:v for k,v in payload.items() if k!="url"}, ensure_ascii=False)}')
            try:
                with httpx.Client(timeout=180) as c:
                    r = c.post(API, headers=HEADERS, json=payload)
                    print(f'  Firecrawl HTTP {r.status_code}')
                    try:
                        d = r.json()
                    except Exception:
                        print(f'  非 JSON 回應前 300 字: {r.text[:300]!r}')
                        return
                    if not d.get('success'):
                        print(f'  success=False, error={d.get("error")!r}, 前300字={str(d)[:300]!r}')
                        return
                    data = d.get('data', {})
                    meta = data.get('metadata', {})
                    html = data.get('rawHtml') or data.get('html') or ''
                    md = data.get('markdown') or ''
                    body = html or md
                    has_articles = '/page/article.do?articleId=' in body
                    print(f'  目標 statusCode: {meta.get("statusCode")}')
                    print(f'  rawHtml/markdown 長度: {len(body)}')
                    print(f'  含文章連結 article.do?articleId=: {has_articles}')
                    if has_articles:
                        print('  ✅ 成功抓到航警列表！')
                    else:
                        print(f'  內容前 200 字: {body[:200]!r}')
            except Exception as e:
                print(f'  例外: {type(e).__name__}: {e}')

        base = {'url': MSA_URL, 'formats': ['rawHtml'], 'onlyMainContent': False}

        try_scrape('A) 預設', dict(base))
        try_scrape('B) proxy=auto', dict(base, proxy='auto'))
        try_scrape('C) proxy=stealth + location CN',
                   dict(base, proxy='stealth', location={'country': 'CN', 'languages': ['zh-CN']}))
        try_scrape('D) proxy=stealth + waitFor 5s',
                   dict(base, proxy='stealth', waitFor=5000))

        print('\n（診斷用，不判定成敗）')
        EOF
