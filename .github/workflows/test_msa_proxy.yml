name: Test MSA scrape connectivity

# 暫時性診斷 workflow：測繪可通省級海事局子站的航警列表端點與文章格式。
# 驗證完成後可刪除此檔案。
on:
  workflow_dispatch:
  push:
    branches:
      - claude/nav-warnings-cutoff-u0yauw
    paths:
      - '.github/workflows/test_msa_proxy.yml'
      - 'scripts/scrapers/base_scraper.py'

jobs:
  test-firecrawl:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: pip install httpx beautifulsoup4

    - name: 🗺️ Map provincial MSA nav-warning endpoints
      run: |
        python - <<'EOF'
        import httpx, re
        from bs4 import BeautifulSoup

        UA = ('Mozilla/5.0 (Windows NT 10.0; Win64; x64) '
              'AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36')
        KW = ['警告', '通告', '航行', '军事', '演习', '实弹', '射击', '禁航', '禁止驶入']

        def get(url):
            with httpx.Client(timeout=45, headers={'User-Agent': UA,
                    'Accept-Language': 'zh-CN,zh;q=0.9'}, follow_redirects=True, verify=False) as c:
                return c.get(url)

        def analyse(name, url, dump_html=0):
            print(f'\n===== {name} =====\n  {url}')
            try:
                r = get(url)
            except Exception as e:
                print(f'  例外 {type(e).__name__}: {str(e)[:150]}'); return
            body = r.text
            print(f'  HTTP {r.status_code} | len {len(body)}')
            soup = BeautifulSoup(body, 'html.parser')
            # 1) 含關鍵字的連結
            hits = []
            for a in soup.find_all('a', href=True):
                t = a.get_text(strip=True)
                if any(k in t for k in KW) and len(t) >= 4:
                    hits.append((t, a['href']))
            print(f'  關鍵字連結 {len(hits)} 筆：')
            for t, h in hits[:12]:
                print(f'    - {t[:38]} -> {h[:90]}')
            # 2) 內嵌 AJAX/資料端點線索
            eps = set(re.findall(r'''["'\(]([^"'\(\)\s]*(?:\.do|\.jhtml|list|List|json|classid|channelId)[^"'\)\s]*)["'\)]''', body))
            eps = [e for e in eps if len(e) < 120 and ('/' in e or '.do' in e or '.jhtml' in e or 'list' in e.lower())]
            print(f'  疑似端點 {len(eps)} 筆：')
            for e in list(eps)[:12]:
                print(f'    ep: {e[:110]}')
            if dump_html:
                print('  --- HTML 前段 ---')
                print(body[:dump_html])

        # 广西：classid=16 疑似航警列表
        analyse('广西 contentlist?classid=16', 'http://www.gx.msa.gov.cn/contentlist.html?classid=16', dump_html=1200)
        # 上海：航行通警告数据
        analyse('上海 hxtjgsj', 'https://www.sh.msa.gov.cn/hxtjgsj/index.jhtml')
        # 山东：站內搜尋「航行警告」/找欄目
        analyse('山东 首頁', 'https://www.sd.msa.gov.cn/')
        analyse('山东 站內搜尋 航行警告', 'https://www.sd.msa.gov.cn/search.jsp?keyword=%E8%88%AA%E8%A1%8C%E8%AD%A6%E5%91%8A')

        print('\n（診斷用，不判定成敗）')
        EOF
