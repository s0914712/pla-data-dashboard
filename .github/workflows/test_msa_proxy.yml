name: Test MSA scrape connectivity

# 暫時性驗證 workflow：跑真實爬蟲(.jhtml 端點)確認端到端可用。驗證後刪除。
on:
  workflow_dispatch:
  push:
    branches:
      - claude/nav-warnings-cutoff-u0yauw
    paths:
      - '.github/workflows/test_msa_proxy.yml'
      - 'scripts/scrapers/NavigationWarning_scraper.py'
      - 'scripts/scrapers/base_scraper.py'
      - 'scripts/scrape_nav_warnings.py'

jobs:
  test-firecrawl:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: pip install requests beautifulsoup4 pandas lxml httpx

    - name: 🧪 Run real scraper end-to-end (no commit)
      run: |
        python scripts/scrape_nav_warnings.py --max-pages 1 --days-back 365 || true
        echo "===== statistics.json ====="
        cat data/navigation_warnings/statistics.json | python -m json.tool
        echo "===== 前幾筆(標題/日期/頻道/座標數) ====="
        python - <<'EOF'
        import json
        rows = json.load(open('data/navigation_warnings/military_exercises.json'))
        print(f'總筆數 {len(rows)}')
        for r in rows[-8:]:
            print(f"  {r.get('publish_date')} | {r.get('channel')} | 座標{r.get('coordinate_count')} | {str(r.get('title'))[:40]}")
        EOF
