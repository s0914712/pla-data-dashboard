name: Test MSA scrape connectivity

# 暫時性診斷 workflow：驗證 Firecrawl 能否抓 msa.gov.cn 航警頁。
# 驗證完成後可刪除此檔案。
on:
  workflow_dispatch:
  push:
    branches:
      - claude/nav-warnings-cutoff-u0yauw
    paths:
      - '.github/workflows/test_msa_proxy.yml'
      - 'scripts/scrapers/base_scraper.py'

jobs:
  test-firecrawl:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: pip install httpx

    - name: 🧪 Test msa.gov.cn access strategies (round 3)
      env:
        FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import httpx

        CID = 'C8896863-B101-4C43-8705-536A03EB46FF'  # 辽宁海事局
        MSA_HOME = 'https://www.msa.gov.cn/'
        CHANNEL_PAGE = f'https://www.msa.gov.cn/page/channelPage.do?channelids={CID}'
        MSA_URL = f'https://www.msa.gov.cn/page/channelArticles.do?channelids={CID}&pageNo=1'
        UA = ('Mozilla/5.0 (Windows NT 10.0; Win64; x64) '
              'AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36')

        def has_links(body):
            return '/page/article.do?articleId=' in (body or '')

        # ===== 直連：AJAX 標頭 X-Requested-With =====
        print('=== 直連 httpx + X-Requested-With ===')
        try:
            with httpx.Client(timeout=30, headers={'User-Agent': UA,
                    'Accept-Language': 'zh-CN,zh;q=0.9'}, follow_redirects=True) as c:
                h = c.get(MSA_HOME)
                print(f'  首頁 HTTP {h.status_code}, cookies={dict(c.cookies)}')
                r = c.get(MSA_URL, headers={'Referer': CHANNEL_PAGE,
                        'X-Requested-With': 'XMLHttpRequest'})
                print(f'  channelArticles+XHR: HTTP {r.status_code} | len {len(r.text)} | 連結 {has_links(r.text)}')
                if not has_links(r.text):
                    print(f'    前140字: {r.text[:140]!r}')
        except Exception as e:
            print(f'  例外 {type(e).__name__}: {e}')

        # ===== Firecrawl =====
        key = (os.getenv('FIRECRAWL_API_KEY') or '').strip()
        if not key:
            print('\n⚠️ 無 FIRECRAWL_API_KEY，略過'); sys.exit(0)
        API = 'https://api.firecrawl.dev/v2/scrape'
        FH = {'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'}

        def fc(label, payload):
            print(f'\n--- Firecrawl {label} ---')
            try:
                with httpx.Client(timeout=200) as c:
                    r = c.post(API, headers=FH, json=payload)
                    d = r.json()
                    if not d.get('success'):
                        print(f'  success=False error={d.get("error")!r}'); return
                    data = d.get('data', {}); meta = data.get('metadata', {})
                    body = data.get('rawHtml') or data.get('html') or ''
                    md = data.get('markdown') or ''
                    links = data.get('links') or []
                    art_links = [l for l in links if 'article.do?articleId=' in l]
                    print(f'  statusCode={meta.get("statusCode")} | rawHtml len {len(body)} | '
                          f'md len {len(md)} | links {len(links)} | 文章連結數 {len(art_links)}')
                    print(f'  rawHtml 含連結: {has_links(body)} | md 含連結: {has_links(md)}')
                    if art_links[:3]:
                        print(f'  範例文章連結: {art_links[:3]}')
                    elif body:
                        print(f'  rawHtml 前140字: {body[:140]!r}')
            except Exception as e:
                print(f'  例外 {type(e).__name__}: {e}')

        print('\n=== Firecrawl round 3 ===')
        # G1) 欄目頁（使用者實際點開的頁），渲染 + 等 AJAX，取 links
        fc('G1) channelPage.do 渲染',
           {'url': CHANNEL_PAGE, 'formats': ['rawHtml', 'links'],
            'onlyMainContent': False, 'waitFor': 6000})
        # G2) 資料頁 + AJAX 標頭
        fc('G2) channelArticles.do + X-Requested-With',
           {'url': MSA_URL, 'formats': ['rawHtml'], 'onlyMainContent': False,
            'headers': {'X-Requested-With': 'XMLHttpRequest', 'Referer': CHANNEL_PAGE}})
        # G3) 同 session 先過首頁再抓資料頁（actions 多步）
        fc('G3) actions: 先訪首頁→再navigate資料頁',
           {'url': MSA_HOME, 'formats': ['rawHtml'], 'onlyMainContent': False,
            'actions': [{'type': 'wait', 'milliseconds': 3000},
                        {'type': 'navigate', 'url': MSA_URL},
                        {'type': 'wait', 'milliseconds': 3000}]})

        print('\n（診斷用，不判定成敗）')
        EOF
