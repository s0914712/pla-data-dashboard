name: Daily News Data Update

on:
  schedule:
    # 每天 UTC 00:15 執行 (台北時間 08:15)
    - cron: '15 0 * * *'
  
  # 允許手動觸發
  workflow_dispatch:
    inputs:
      days_back:
        description: '爬取過去幾天的新聞'
        required: false
        default: '7'
        type: string
      skip_push:
        description: '跳過推送到 GitHub'
        required: false
        default: false
        type: boolean

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 允許推送
    
    steps:
      # 1. 檢出代碼
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 完整歷史
      
      # 2. 設置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. 安裝依賴
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch to avoid multi-GB CUDA packages that exhaust the runner disk
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements.txt
          playwright install chromium --with-deps
      
      # 4. 執行更新腳本
      - name: Run news scraper and classifier
        env:
          SERPAPI_KEY : ${{ secrets.SERPAPI_KEY  }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          WEIBO_TARGET_UID: ${{ secrets.WEIBO_TARGET_UID }}
        run: |
          python scripts/main.py \
            --days ${{ github.event.inputs.days_back || '7' }} \
            ${{ github.event.inputs.skip_push == 'true' && '--no-push' || '' }}
      
      # 5. 顯示更新摘要（可選）
      - name: Show update summary
        if: always()
        run: |
          if [ -f data/last_update.json ]; then
            echo "📊 Update Summary:"
            cat data/last_update.json
          fi
      
    # 6. 提交變更（增強衝突處理）
      - name: Commit and push data changes
        if: ${{ github.event.inputs.skip_push != 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 先暫存所有變更
          git add data/*.csv || true
          git add data/*.json || true
          git add data/logs/*.json || true
          
          # 檢查是否有變更
          if git diff --staged --quiet; then
            echo "✓ No changes to commit"
          else
            # 獲取變更統計
            git diff --staged --stat
            
            # 提交變更
            git commit -m "🤖 Auto-update data: $(date +'%Y-%m-%d %H:%M:%S')"
            
            # 【關鍵修復】：使用策略性 rebase 處理衝突
            for i in 1 2 3 4; do
              # 嘗試推送，如果成功就結束
              git push && break || echo "Push failed (attempt $i/4)"
              
              echo "Pulling latest changes with strategy to resolve conflicts..."
              # 使用 --autostash 把當前 commit 暫存，
              # 使用 -X theirs 表示遇到檔案內容衝突時，以我們這次爬蟲產生的結果為準
              git pull --rebase --autostash -X theirs origin main
              
              # 稍微等待後重試
              sleep $((2 ** i))
            done
            echo "✓ Changes pushed successfully"
          fi
      
      # 7. 上傳日誌作為 Artifact
      - name: Upload execution logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: update-logs-${{ github.run_number }}
          path: data/logs/
          retention-days: 30
      
      # 8. 上傳數據文件作為 Artifact（用於備份）
      - name: Upload data files
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: data-snapshot-${{ github.run_number }}
          path: |
            data/*.csv
            data/*.json
          retention-days: 7

  # 失敗通知
  notify-on-failure:
    needs: update-data
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "❌ Daily update job failed"
          echo "Run number: ${{ github.run_number }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Check logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # TODO: 可以在這裡添加 Slack/Discord/Email 通知
          # 例如：
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"❌ PLA Data Update Failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
