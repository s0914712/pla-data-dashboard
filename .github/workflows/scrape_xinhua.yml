name: Xinhua Scraper (新華社台灣頻道)

on:
  schedule:
    # 每天 UTC 02:00 執行 (台北時間 10:00)，錯開其他 workflow
    - cron: '0 2 * * *'

  # 允許手動觸發
  workflow_dispatch:
    inputs:
      days_back:
        description: '爬取過去幾天的新聞'
        required: false
        default: '7'
        type: string

jobs:
  scrape-xinhua:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. 檢出代碼
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. 設置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安裝依賴
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch to avoid multi-GB CUDA packages that exhaust the runner disk
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements.txt
          python -m playwright install --with-deps chromium

      # 4. 執行新華社爬蟲
      - name: Run Xinhua scraper
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          python scripts/crawl_xinhua.py \
            --days ${{ github.event.inputs.days_back || '7' }} \
            --no-push

      # 5. 提交並推送變更
      - name: Commit and push data changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

          git add data/news_classified.json data/news_relevant.json || true

          if git diff --staged --quiet; then
            echo "✓ No changes to commit"
          else
            git diff --staged --stat
            git commit -m "🤖 Xinhua auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
            for i in 1 2 3 4; do
              git push && break
              echo "Push failed (attempt $i/4), pulling latest changes..."
              git pull --rebase --autostash -X theirs origin main
              sleep $((2 ** i))
            done
            echo "✓ Changes pushed successfully"
          fi

      # 6. 上傳數據快照
      - name: Upload data snapshot
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: xinhua-data-${{ github.run_number }}
          path: |
            data/news_classified.json
            data/news_relevant.json
          retention-days: 7
